spring.application.name=api-product-service-realproject
server.port=7070


# =====================================================================
# MySQL DATABASE CONNECTION SETTINGS
# =====================================================================
# Replace 'localhost:3306' with your server host and 'your_database_name' with your actual schema
spring.datasource.url=jdbc:mysql://localhost:3306/product_service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Database credentials
spring.datasource.username=root
spring.datasource.password=Param@123

# Driver class name (Optional for modern Spring Boot versions as it auto-detects it)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================================
# JPA / Hibernate Configurations
# =====================================================================
# Specifies how Hibernate handles the database schema (e.g., update, create, none)
spring.jpa.hibernate.ddl-auto=update

# Shows executed SQL queries in the console log
spring.jpa.show-sql=true

# Formats the logged SQL for better readability
spring.jpa.properties.hibernate.format_sql=true

# Optional: Explicitly declares the Hibernate dialect for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

